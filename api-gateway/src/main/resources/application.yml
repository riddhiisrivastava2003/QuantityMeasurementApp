server:
  port: 8082

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: quantity-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/quantity/**
          filters:
            - StripPrefix=1

        - id: auth-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1