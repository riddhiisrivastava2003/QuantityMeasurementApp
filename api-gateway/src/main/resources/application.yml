server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "https://quantity-measurement-app-frontend-puce.vercel.app"
              - "http://localhost:5173"
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      discovery:
        locator:
          enabled: false

      # DedupeResponseHeader — safety net if downstream ever adds CORS headers again
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/auth/**

        - id: auth-oauth2
          uri: ${AUTH_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/oauth2/**

        - id: auth-login-oauth2
          uri: ${AUTH_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/login/oauth2/**

        - id: quantity-service
          uri: ${QUANTITY_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/quantity/**

        - id: history-service
          uri: ${HISTORY_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/history/**

eureka:
  client:
    enabled: false

logging:
  level:
    org.springframework.cloud.gateway: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
