spring.application.name=auth-service

server.port=${PORT:8082}

# DATABASE (FIXED)
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
# table auto create update
spring.jpa.show-sql=false
#sql logs hide
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
#Hibernate ko bataya: MySQL use ho raha hai
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
#Timezone fix (important for production)

# EUREKA
eureka.client.enabled=true
eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.instance.prefer-ip-address=true


# OAUTH
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${AUTH_SERVICE_URL}/login/oauth2/code/google

frontend.url=${FRONTEND_URL}

# SWAGGER
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html